name: build-taktchat-backend (GHCR)

on:
  push:
    branches: ["main", "master"]
    paths:
      - "backend/**"
      - ".github/workflows/build-taktchat-backend-ghcr.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify backend build outputs (label-sync server)
        working-directory: backend
        run: |
          npm ci --legacy-peer-deps
          npm run build
          test -f dist/internal/label-sync-server.js

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend (lean) — build & push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: runtime-lean
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/taktchat-backend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/taktchat-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            BACKEND_VERSION=${{ github.sha }}

      - name: Backend (browser) — build & push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: runtime-browser
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/taktchat-backend-browser:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/taktchat-backend-browser:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            BACKEND_VERSION=${{ github.sha }}

